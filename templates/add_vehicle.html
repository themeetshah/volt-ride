<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Vehicle - VoltRide Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        /* Theme Colors */
        :root {
            --primary-color: #00D4FF;
            --secondary-color: #00FF88;
            --background-color: #1E1E1E;
            --text-color: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
        }

        body,
        html {
            background-color: #1E1E1E;
            color: #FFFFFF;
            height: 100vh;
            padding-top: 40px;
        }

        /* Navbar Styling */
        .navbar-custom {
            background-color: #252525;
            border-radius: 30px;
            padding: 10px 20px;
            box-shadow: 0px 2px 10px rgb(0, 255, 136, 0.2);
        }

        .navbar-brand,
        .navbar-nav .nav-link {
            color: #00FF88 !important;
            font-size: 16px;
            transition: color 0.3s;
        }

        .navbar-nav .nav-link:hover {
            color: #00D4FF !important;
        }

        .logout-button {
            border-radius: 20px;
            background-color: #01cd6e;
            color: white;
            padding: 10px 20px;
            transition: background-color 0.3s;
        }

        .logout-button:hover {
            background-color: #00D4FF;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 30px;
        }

        h1 {
            color: var(--primary-color);
        }

        label {
            color: var(--secondary-color);
        }

        .form-control {
            background-color: #252525;
            border: 1px solid var(--border-color);
            color: white;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            color: var(--background-color);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top mx-4 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-bolt"></i> VoltRide
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span><i class="fas fa-bars" style="color: #00FF88;"></i></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Access</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Pricing</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
            <div class="ms-auto">
                <a href="/logout" class="btn logout-button"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1 class="mb-4">Add New Vehicle</h1>
            <form action="/add-vehicle" method="post">
                <!-- Registration Plate -->
                <div class="mb-3">
                    <label for="reg_plate" class="form-label">Registration Plate</label>
                    <input type="text" class="form-control" id="reg_plate" name="reg_plate" placeholder="e.g., AB-1234"
                        required>
                </div>

                <!-- Vehicle Name -->
                <div class="mb-3">
                    <label for="name" class="form-label">Vehicle Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="e.g., VoltRide X1"
                        required>
                </div>

                <!-- Battery Percentage -->
                <div class="mb-3">
                    <label for="battery" class="form-label">Battery (%)</label>
                    <input type="number" class="form-control" id="battery" name="battery" min="0" max="100" required>
                </div>

                <!-- Station ID -->
                <div class="mb-3">
                    <label for="station_id" class="form-label">Station ID</label>
                    <input type="number" class="form-control" id="station_id" name="station_id" required>
                </div>

                <!-- Vehicle Status -->
                <div class="mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-control" id="status" name="status" required>
                        <option value="Available">Available</option>
                        <option value="Occupied">Occupied</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">Add Vehicle</button>
            </form>
        </div>
    </div>
</body>

</html>
