<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet - VoltRide</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            background-color: #1E1E1E;
            color: white;
            padding-top: 80px;
        }

        /* Navbar Styling */
        .navbar-custom {
            background-color: #252525;
            border-radius: 30px;
            padding: 10px 20px;
            box-shadow: 0px 2px 10px rgb(0, 255, 136, 0.2);
        }

        .navbar-brand,
        .navbar-nav .nav-link {
            color: #00FF88 !important;
            font-size: 16px;
            transition: color 0.3s;
        }

        .navbar-nav .nav-link:hover {
            color: #00D4FF !important;
        }

        .logout-button {
            border-radius: 20px;
            background-color: #01cd6e;
            color: white;
            padding: 10px 20px;
            transition: background-color 0.3s;
        }

        .logout-button:hover {
            background-color: #00D4FF;
        }

        /* Theme Colors */
        :root {
            --primary-color: #00D4FF;
            --secondary-color: #00FF88;
            --background-color: #1E1E1E;
            --text-color: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.2);
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
        }

        .balance {
            font-size: 3rem;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            color: var(--background-color);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            border: none;
            color: var(--background-color);
        }

        .btn-secondary:hover {
            background-color: var(--primary-color);
            color: var(--background-color);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top mx-4 mt-2">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-bolt"></i> VoltRide
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span><i class="fas fa-bars" style="color: #00FF88;"></i></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="/wallet">Wallet</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
                    <!-- <li class="nav-item"><a class="nav-link" href="#">Contact</a></li> -->
                </ul>
            </div>
            <div class="ms-auto">
                <a href="/logout" class="btn logout-button"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="card">
            <h1>VoltRide Wallet</h1>
            <p class="mt-3 text-white">Welcome, <strong>{{ user['first-name'] }} {{ user['last-name'] }}</strong></p>

            <h2 class="mt-4 text-white">Current Wallet Balance</h2>
            <p class="balance">₹{{ wallet.amount }}</p>

            <div class="mt-4">
                <a href="/add-funds" class="btn btn-primary me-3">Add Funds</a>
                <!-- <a href="/withdraw" class="btn btn-secondary">Withdraw Funds</a> -->
            </div>
        </div>
    </div>
</body>

</html>
